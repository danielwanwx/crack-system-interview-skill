interface:
  display_name: "Senior SDE Interview Script"
  short_description: "Turn notes into bilingual scripts and Excalidraw boards"
  default_prompt: "Use $senior-sde-interview-script to summarize this excerpt, draft bilingual senior SDE answers, and create an Excalidraw visual."
dependencies:
  tools:
    - type: "mcp"
      value: "excalidraw"
      description: "Excalidraw MCP server for drawing interview explanation boards"
      transport: "streamable_http"
      url: "https://mcp.excalidraw.com"
